<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Eng-cha</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.css">
  <style>
    /* ── Reset & Variables ── */
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #eef1f6;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --glass: rgba(255,255,255,0.65);
      --glass-border: rgba(255,255,255,0.8);
      --text: #1e293b;
      --text-muted: #64748b;
      --danger: #ef4444;
      --success: #22c55e;
      --radius: 12px;
      --radius-sm: 6px;
    }
    html, body {
      margin: 0; padding: 0;
      height: 100%;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── App Shell (phone-frame on desktop) ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
      background: var(--bg);
      position: relative;
      box-shadow: 0 0 60px rgba(0,0,0,0.12);
    }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      padding: 20px 20px 14px;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.6);
    }
    header h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    header p {
      margin: 3px 0 0;
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── Content Area ── */
    #content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px;
    }

    /* ── Tab Panes ── */
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ── Bottom Navigation ── */
    .bottom-nav {
      flex-shrink: 0;
      display: flex;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(0,0,0,0.07);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .bottom-nav button {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 10px 0 12px;
      border: none;
      background: transparent;
      font-size: 11px;
      font-weight: 500;
      color: #94a3b8;
      cursor: pointer;
      transition: color 0.2s;
      min-height: 60px;
      -webkit-tap-highlight-color: transparent;
    }
    .bottom-nav button .icon { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
    .bottom-nav button .icon svg { width: 22px; height: 22px; }
    .bottom-nav button.active { color: var(--accent); }

    /* ── Shared Components ── */
    .card {
      background: var(--glass);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: var(--radius);
      border: 1px solid var(--glass-border);
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      padding: 16px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 20px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      width: 100%;
      min-height: 50px;
    }
    .btn-primary:active { background: var(--accent-dark); transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-ghost {
      background: rgba(37,99,235,0.1);
      color: var(--accent);
      font-size: 13px;
      padding: 8px 14px;
    }
    .btn-ghost:active { background: rgba(37,99,235,0.2); }
    .btn-ghost.active { background: var(--accent); color: #fff; }
    .btn-danger {
      background: rgba(239,68,68,0.1);
      color: var(--danger);
      font-size: 13px;
      padding: 8px 12px;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-family: inherit;
    }
    .btn-danger:active { background: rgba(239,68,68,0.2); }
    textarea {
      width: 100%;
      padding: 14px;
      border: 1.5px solid rgba(37,99,235,0.2);
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.8);
      font-size: 16px;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      color: var(--text);
    }
    textarea:focus { border-color: var(--accent); }
    .mt { margin-top: 12px; }
    .hidden { display: none !important; }
    .error-msg { color: var(--danger); font-size: 13px; margin-top: 8px; }
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 44px; margin-bottom: 12px; }
    .empty-state p { margin: 0; font-size: 14px; line-height: 1.6; }
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30,41,59,0.9);
      color: #fff;
      padding: 10px 22px;
      border-radius: 999px;
      font-size: 14px;
      z-index: 200;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    /* ── Tab 1: 번역 ── */
    #translate-result { margin-top: 16px; }
    #english-text {
      font-size: 18px;
      font-weight: 500;
      line-height: 1.5;
      color: var(--text);
      margin: 0 0 14px;
      word-break: break-word;
    }
    .action-row { display: flex; gap: 8px; flex-wrap: wrap; }

    /* ── Tab 2: 내 문장 ── */
    .toggle-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .sentence-card {
      background: var(--glass);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .sentence-card .korean {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 5px;
      transition: filter 0.3s;
      word-break: break-word;
    }
    .sentence-card .english {
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      transition: filter 0.3s;
      word-break: break-word;
    }
    .sentence-card .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .sentence-card .edit-input {
      width: 100%;
      padding: 7px 11px;
      border: 1.5px solid var(--accent);
      border-radius: 8px;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      background: rgba(255,255,255,0.9);
    }
    #sentences-list.hide-korean .korean { filter: blur(5px); user-select: none; }
    #sentences-list.hide-english .english { filter: blur(5px); user-select: none; }
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      margin-top: 16px;
      padding-bottom: 8px;
    }
    .pagination span { font-size: 14px; color: var(--text-muted); min-width: 50px; text-align: center; }

    /* ── Tab 3: 퀴즈 ── */
    .mode-selector { display: flex; gap: 8px; margin-bottom: 16px; }
    .mode-selector button {
      flex: 1;
      padding: 10px;
      border: 2px solid rgba(37,99,235,0.2);
      border-radius: 999px;
      background: rgba(255,255,255,0.6);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .mode-selector button.active {
      border-color: var(--accent);
      background: rgba(37,99,235,0.1);
      color: var(--accent);
    }
    .quiz-progress {
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      margin: 0 0 14px;
    }
    .flashcard-container { perspective: 1200px; margin-bottom: 20px; }
    .flashcard {
      width: 100%;
      min-height: 210px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
      cursor: pointer;
    }
    .flashcard.flipped { transform: rotateY(180deg); }
    .flashcard-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: var(--radius);
      background: var(--glass);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--glass-border);
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 24px;
      text-align: center;
    }
    .flashcard-back { transform: rotateY(180deg); }
    .flashcard-face .prompt-lang {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 14px;
    }
    .flashcard-face .sentence-text {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
      word-break: break-word;
    }
    .flashcard-face .tap-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 18px;
    }
    .flashcard-face .listen-btn-quiz { margin-top: 16px; }
    /* placeholder keeps layout height before JS renders */
    .flashcard-placeholder { min-height: 210px; }
    .quiz-actions {
      display: flex;
      gap: 12px;
    }
    .quiz-actions button {
      flex: 1;
      padding: 16px;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }
    .quiz-actions button:active { transform: scale(0.96); }
    #know-btn { background: rgba(34,197,94,0.15); color: var(--success); }
    #know-btn:active { background: rgba(34,197,94,0.28); }
    #dont-know-btn { background: rgba(239,68,68,0.12); color: var(--danger); }
    #dont-know-btn:active { background: rgba(239,68,68,0.24); }
    .quiz-done { text-align: center; padding: 40px 20px; }
    .quiz-done h3 { margin: 0 0 8px; font-size: 22px; }
    .quiz-done p { margin: 0 0 22px; color: var(--text-muted); font-size: 14px; }

    /* ── Tab 4: 발음 연습 ── */
    .pron-hint { font-size: 13px; color: var(--text-muted); margin: 0 0 12px; }
    .pron-list { display: flex; flex-direction: column; gap: 8px; }
    .pron-card {
      background: var(--glass);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 12px 16px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .pron-card:active { transform: scale(0.98); }
    .pron-card.selected { border-color: var(--accent); background: rgba(37,99,235,0.07); }
    .pron-card .pron-korean { font-size: 12px; color: var(--text-muted); margin-bottom: 3px; word-break: break-word; }
    .pron-card .pron-english { font-size: 15px; color: var(--text); font-weight: 500; word-break: break-word; }
    .best-badge {
      display: inline-block;
      margin-top: 6px;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      background: rgba(37,99,235,0.1);
      padding: 2px 8px;
      border-radius: 999px;
    }
    .practice-panel { display: none; }
    .practice-panel.visible { display: block; }
    .practice-target {
      background: var(--glass);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      margin-bottom: 16px;
    }
    .practice-target .target-text {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 12px;
      word-break: break-word;
    }
    .record-section { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 16px; }
    .record-btn {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 4px 20px rgba(37,99,235,0.3);
      -webkit-tap-highlight-color: transparent;
    }
    .record-btn:active { transform: scale(0.92); }
    .record-btn.recording {
      background: var(--danger);
      box-shadow: 0 4px 20px rgba(239,68,68,0.4);
      animation: pulse-mic 1.2s ease-out infinite;
    }
    @keyframes pulse-mic {
      0%   { box-shadow: 0 0 0 0 rgba(239,68,68,0.5); }
      70%  { box-shadow: 0 0 0 18px rgba(239,68,68,0); }
      100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
    }
    .record-btn svg { width: 28px; height: 28px; }
    .record-status { font-size: 13px; color: var(--text-muted); }
    .score-section {
      background: var(--glass);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      margin-bottom: 12px;
    }
    .score-number { font-size: 52px; font-weight: 700; color: var(--accent); line-height: 1; }
    .score-label { font-size: 14px; color: var(--text-muted); margin-bottom: 14px; }
    .word-results { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 4px; }
    .word-chip { padding: 4px 10px; border-radius: 999px; font-size: 13px; font-weight: 500; }
    .word-chip.match { background: rgba(34,197,94,0.15); color: #15803d; }
    .word-chip.miss  { background: rgba(239,68,68,0.12); color: var(--danger); text-decoration: line-through; }
    .pron-best-record { font-size: 12px; color: var(--text-muted); margin-top: 10px; font-weight: 600; }
    .pron-new-record { color: var(--success); }
  </style>
</head>
<body>
<div id="app">

  <!-- ── Header ── -->
  <header>
    <h1>Eng-cha</h1>
    <p>내가 말하고 싶은 문장을 영어로</p>
  </header>

  <!-- ── Main Content ── -->
  <main id="content">

    <!-- Tab 1: 번역 -->
    <section id="tab-translate" class="tab-pane active">
      <textarea id="korean-input" rows="4" placeholder="번역할 한국어 문장을 입력하세요…&#10;(Enter로 번역)"></textarea>
      <button class="btn btn-primary mt" id="translate-btn" onclick="doTranslate()">번역하기 →</button>
      <p id="translate-error" class="error-msg hidden"></p>

      <div id="translate-result" class="card hidden">
        <p id="english-text"></p>
        <div class="action-row">
          <button class="btn btn-ghost" id="listen-btn" onclick="doListen()">▶ 듣기</button>
          <button class="btn btn-ghost" id="repeat-btn" onclick="toggleRepeat()">↺ 반복</button>
          <button class="btn btn-ghost" id="save-btn" onclick="doSave()">저장</button>
        </div>
      </div>
    </section>

    <!-- Tab 2: 내 문장 -->
    <section id="tab-sentences" class="tab-pane">
      <div class="toggle-row">
        <button class="btn btn-ghost" id="toggle-korean" onclick="toggleHide('korean')">한국어 가리기</button>
        <button class="btn btn-ghost" id="toggle-english" onclick="toggleHide('english')">영어 가리기</button>
      </div>
      <div id="sentences-list"></div>
      <div class="pagination hidden" id="pagination">
        <button class="btn btn-ghost" id="prev-btn" onclick="changePage(-1)">← 이전</button>
        <span id="page-info"></span>
        <button class="btn btn-ghost" id="next-btn" onclick="changePage(1)">다음 →</button>
      </div>
    </section>

    <!-- Tab 3: 퀴즈 -->
    <section id="tab-quiz" class="tab-pane">
      <div class="mode-selector">
        <button id="mode-kr-en" class="active" onclick="setQuizMode('kr-en')">KR → EN</button>
        <button id="mode-en-kr" onclick="setQuizMode('en-kr')">EN → KR</button>
      </div>
      <p class="quiz-progress" id="quiz-progress"></p>
      <div id="quiz-area"><div class="flashcard-placeholder"></div></div>
    </section>

    <!-- Tab 4: 발음 연습 -->
    <section id="tab-pron" class="tab-pane">
      <!-- 문장 목록 -->
      <div id="pron-list-view">
        <p class="pron-hint">연습할 문장을 선택하세요</p>
        <div id="pron-sentence-list" class="pron-list"></div>
      </div>

      <!-- 연습 패널 -->
      <div id="pron-practice-view" class="practice-panel">
        <button class="btn btn-ghost" onclick="pronBack()" style="margin-bottom:12px;">← 목록으로</button>

        <div class="practice-target">
          <div class="target-text" id="pron-target-text"></div>
          <button class="btn btn-ghost" onclick="pronListen()">▶ 발음 듣기</button>
        </div>

        <div class="record-section">
          <button class="record-btn" id="record-btn" onclick="toggleRecording()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="22"/>
            </svg>
          </button>
          <div class="record-status" id="record-status">탭하여 녹음 시작</div>
        </div>

        <div id="pron-result" class="score-section hidden">
          <div class="score-number" id="pron-score"></div>
          <div class="score-label">점</div>
          <div class="word-results" id="pron-words"></div>
          <div class="pron-best-record" id="pron-best-record"></div>
        </div>
      </div>
    </section>

  </main>

  <!-- ── Bottom Navigation ── -->
  <nav class="bottom-nav">
    <button class="active" data-tab="translate" onclick="showTab('translate')">
      <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 1 21 5l-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23 3 19l4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg></span>
      <span>번역</span>
    </button>
    <button data-tab="sentences" onclick="showTab('sentences')">
      <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><line x1="4" y1="6" x2="4.01" y2="6"/><line x1="4" y1="12" x2="4.01" y2="12"/><line x1="4" y1="18" x2="4.01" y2="18"/></svg></span>
      <span>내 문장</span>
    </button>
    <button data-tab="quiz" onclick="showTab('quiz')">
      <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 3H8a2 2 0 0 0-2 2v2h12V5a2 2 0 0 0-2-2Z"/></svg></span>
      <span>퀴즈</span>
    </button>
    <button data-tab="pron" onclick="showTab('pron')">
      <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg></span>
      <span>발음</span>
    </button>
  </nav>

</div>
<div class="toast" id="toast"></div>

<script>
/* ── State ── */
const s = {
  english: '',
  looping: false,
  sentences: [],
  page: 1,
  total: 0,
  limit: 20,
  hideKorean: false,
  hideEnglish: false,
  quiz: { mode: 'kr-en', deck: [], idx: 0, flipped: false },
  pron: { sentences: [], selected: null, isRecording: false, recognition: null },
};

/* ── Tab Switching ── */
function showTab(tab) {
  document.querySelectorAll('.tab-pane').forEach(p =>
    p.classList.toggle('active', p.id === `tab-${tab}`)
  );
  document.querySelectorAll('.bottom-nav button').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === tab)
  );
  if (tab === 'sentences') loadSentences();
  if (tab === 'quiz') initQuiz();
  if (tab === 'pron') initPron();
}

/* ── Toast ── */
let _toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

/* ── Tab 1: 번역 ── */
async function doTranslate() {
  const input = document.getElementById('korean-input').value.trim();
  if (!input) return;
  const btn = document.getElementById('translate-btn');
  const errEl = document.getElementById('translate-error');
  const resultEl = document.getElementById('translate-result');

  btn.disabled = true;
  btn.textContent = '번역 중…';
  errEl.classList.add('hidden');
  resultEl.classList.add('hidden');

  try {
    const res = await fetch('/api/translate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ korean: input }),
    });
    if (!res.ok) throw new Error();
    const data = await res.json();
    s.english = data.english;
    document.getElementById('english-text').textContent = data.english;
    resultEl.classList.remove('hidden');
    s.looping = false;
    document.getElementById('repeat-btn').classList.remove('active');
    window.speechSynthesis.cancel();
  } catch {
    errEl.textContent = '번역에 실패했습니다. 다시 시도해주세요.';
    errEl.classList.remove('hidden');
  } finally {
    btn.disabled = false;
    btn.textContent = '번역하기 →';
  }
}

function doListen() {
  if (!s.english) return;
  speakEnglish(s.english);
}

function toggleRepeat() {
  s.looping = !s.looping;
  document.getElementById('repeat-btn').classList.toggle('active', s.looping);
  if (s.looping && s.english) speakEnglish(s.english);
  else window.speechSynthesis.cancel();
}

async function doSave() {
  const korean = document.getElementById('korean-input').value.trim();
  if (!korean || !s.english) return;
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  try {
    const res = await fetch('/api/sentences', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ korean, english: s.english }),
    });
    if (!res.ok) throw new Error();
    document.getElementById('korean-input').value = '';
    document.getElementById('translate-result').classList.add('hidden');
    s.english = '';
    s.looping = false;
    document.getElementById('repeat-btn').classList.remove('active');
    window.speechSynthesis.cancel();
    showToast('저장했습니다 ✓');
  } catch {
    showToast('저장 실패');
  } finally {
    btn.disabled = false;
  }
}

/* ── TTS (Web Speech API) ── */
function speakEnglish(text) {
  if (!window.speechSynthesis) { showToast('음성 재생 실패'); return; }
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-US';
  utt.rate = 0.9;
  if (s.looping) {
    utt.onend = () => { if (s.looping) speakEnglish(text); };
  }
  window.speechSynthesis.speak(utt);
}

/* ── Tab 2: 내 문장 ── */
async function loadSentences() {
  try {
    const res = await fetch(`/api/sentences?page=${s.page}&limit=${s.limit}`);
    const data = await res.json();
    s.sentences = data.data;
    s.total = data.total;
    renderSentences();
  } catch {
    showToast('문장 로드 실패');
  }
}

function renderSentences() {
  const list = document.getElementById('sentences-list');
  const pag = document.getElementById('pagination');

  if (s.sentences.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <p>저장된 문장이 없습니다.<br>번역 탭에서 문장을 추가해보세요.</p>
    </div>`;
    pag.classList.add('hidden');
    return;
  }

  list.innerHTML = s.sentences.map(row => `
    <div class="sentence-card" data-id="${row.id}">
      <div class="korean">${esc(row.korean)}</div>
      <div class="english" ondblclick="startEdit(${row.id}, this)">${esc(row.english)}</div>
      <div class="card-actions">
        <button class="btn btn-ghost" onclick="listenSentence(${row.id})">▶ 듣기</button>
        <button class="btn btn-ghost" onclick="startEditById(${row.id})">수정</button>
        <button class="btn-danger" onclick="deleteSentence(${row.id})">삭제</button>
      </div>
    </div>
  `).join('');

  applyHideClasses();

  const totalPages = Math.ceil(s.total / s.limit);
  if (totalPages > 1) {
    pag.classList.remove('hidden');
    document.getElementById('page-info').textContent = `${s.page} / ${totalPages}`;
    document.getElementById('prev-btn').disabled = s.page <= 1;
    document.getElementById('next-btn').disabled = s.page >= totalPages;
  } else {
    pag.classList.add('hidden');
  }
}

function applyHideClasses() {
  const list = document.getElementById('sentences-list');
  list.classList.toggle('hide-korean', s.hideKorean);
  list.classList.toggle('hide-english', s.hideEnglish);
}

function toggleHide(lang) {
  if (lang === 'korean') {
    s.hideKorean = !s.hideKorean;
    document.getElementById('toggle-korean').classList.toggle('active', s.hideKorean);
  } else {
    s.hideEnglish = !s.hideEnglish;
    document.getElementById('toggle-english').classList.toggle('active', s.hideEnglish);
  }
  applyHideClasses();
}

function changePage(delta) {
  const totalPages = Math.ceil(s.total / s.limit);
  s.page = Math.max(1, Math.min(totalPages, s.page + delta));
  loadSentences();
}

function listenSentence(id) {
  const row = s.sentences.find(r => r.id === id);
  if (!row) return;
  speakEnglish(row.english);
}

function startEditById(id) {
  const card = document.querySelector(`.sentence-card[data-id="${id}"]`);
  if (card) startEdit(id, card.querySelector('.english'));
}

function startEdit(id, el) {
  if (el.querySelector('input')) return;
  const original = el.textContent;
  const input = document.createElement('input');
  input.className = 'edit-input';
  input.value = original;
  el.innerHTML = '';
  el.appendChild(input);
  input.focus();
  input.select();

  let committed = false;
  const commit = async () => {
    if (committed) return;
    committed = true;
    const val = input.value.trim();
    if (!val || val === original) { el.textContent = original; return; }
    try {
      const res = await fetch(`/api/sentences/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ english: val }),
      });
      if (!res.ok) throw new Error();
      el.textContent = val;
      const row = s.sentences.find(r => r.id === id);
      if (row) row.english = val;
      showToast('수정했습니다 ✓');
    } catch {
      el.textContent = original;
      showToast('수정 실패');
    }
  };

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { committed = true; el.textContent = original; }
  });
  input.addEventListener('blur', commit);
}

async function deleteSentence(id) {
  if (!confirm('이 문장을 삭제할까요?')) return;
  try {
    const res = await fetch(`/api/sentences/${id}`, { method: 'DELETE' });
    if (!res.ok) throw new Error();
    showToast('삭제했습니다');
    if (s.sentences.length === 1 && s.page > 1) s.page--;
    await loadSentences();
  } catch {
    showToast('삭제 실패');
  }
}

/* ── Tab 3: 퀴즈 ── */
function setQuizMode(mode) {
  s.quiz.mode = mode;
  document.getElementById('mode-kr-en').classList.toggle('active', mode === 'kr-en');
  document.getElementById('mode-en-kr').classList.toggle('active', mode === 'en-kr');
  initQuiz();
}

async function initQuiz() {
  try {
    const res = await fetch('/api/sentences?page=1&limit=100');
    const data = await res.json();
    s.quiz.deck = [...data.data].sort(() => Math.random() - 0.5);
    s.quiz.idx = 0;
    s.quiz.flipped = false;
    renderQuizCard();
  } catch {
    showToast('퀴즈 로드 실패');
  }
}

function renderQuizCard() {
  const area = document.getElementById('quiz-area');
  const prog = document.getElementById('quiz-progress');
  const { deck, idx, mode, flipped } = s.quiz;

  if (deck.length === 0) {
    prog.textContent = '';
    area.innerHTML = `<div class="empty-state">
      <p>저장된 문장이 없습니다.<br>번역 탭에서 문장을 추가해보세요.</p>
    </div>`;
    return;
  }

  if (idx >= deck.length) {
    prog.textContent = '';
    area.innerHTML = `<div class="quiz-done">
      <h3>퀴즈 완료!</h3>
      <p>${deck.length}개 문장을 모두 풀었어요.</p>
      <button class="btn btn-primary" onclick="initQuiz()">다시 하기</button>
    </div>`;
    return;
  }

  const card = deck[idx];
  const frontText = mode === 'kr-en' ? card.korean : card.english;
  const backText  = mode === 'kr-en' ? card.english : card.korean;
  const frontLang = mode === 'kr-en' ? 'KR Korean' : 'EN English';
  const backLang  = mode === 'kr-en' ? 'EN English' : 'KR Korean';

  prog.textContent = `${idx + 1} / ${deck.length}`;

  area.innerHTML = `
    <div class="flashcard-container">
      <div class="flashcard${flipped ? ' flipped' : ''}" id="flashcard" onclick="flipCard()">
        <div class="flashcard-face flashcard-front">
          <div class="prompt-lang">${frontLang}</div>
          <div class="sentence-text">${esc(frontText)}</div>
          <div class="tap-hint">탭하여 정답 확인</div>
        </div>
        <div class="flashcard-face flashcard-back">
          <div class="prompt-lang">${backLang}</div>
          <div class="sentence-text">${esc(backText)}</div>
          ${mode === 'kr-en' ? `<button class="btn btn-ghost listen-btn-quiz" onclick="event.stopPropagation();quizListen()">▶ 듣기</button>` : ''}
        </div>
      </div>
    </div>
    <div class="quiz-actions${flipped ? '' : ' hidden'}" id="quiz-actions">
      <button id="dont-know-btn" onclick="advance()">✗ 몰랐어</button>
      <button id="know-btn" onclick="advance()">✓ 알았어</button>
    </div>`;
}

function flipCard() {
  s.quiz.flipped = !s.quiz.flipped;
  const fc = document.getElementById('flashcard');
  const actions = document.getElementById('quiz-actions');
  if (fc) fc.classList.toggle('flipped', s.quiz.flipped);
  if (actions) actions.classList.toggle('hidden', !s.quiz.flipped);
}

function advance() {
  s.quiz.idx++;
  s.quiz.flipped = false;
  renderQuizCard();
}

function quizListen() {
  const card = s.quiz.deck[s.quiz.idx];
  if (!card) return;
  speakEnglish(card.english);
}

/* ── Utils ── */
function esc(str) {
  return str
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

document.getElementById('korean-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doTranslate(); }
});

/* ── Tab 4: 발음 연습 ── */
async function initPron() {
  // Reset to list view
  document.getElementById('pron-list-view').style.display = '';
  document.getElementById('pron-practice-view').classList.remove('visible');
  if (s.pron.isRecording) stopRecording();
  s.pron.selected = null;

  try {
    const res = await fetch('/api/sentences?page=1&limit=100');
    const data = await res.json();
    s.pron.sentences = data.data;
    renderPronList();
  } catch {
    showToast('문장 로드 실패');
  }
}

function renderPronList() {
  const list = document.getElementById('pron-sentence-list');
  if (s.pron.sentences.length === 0) {
    list.innerHTML = `<div class="empty-state"><p>저장된 문장이 없습니다.<br>번역 탭에서 먼저 문장을 저장해주세요.</p></div>`;
    return;
  }
  list.innerHTML = s.pron.sentences.map(row => `
    <div class="pron-card${s.pron.selected?.id === row.id ? ' selected' : ''}" onclick="selectPronSentence(${row.id})">
      <div class="pron-korean">${esc(row.korean)}</div>
      <div class="pron-english">${esc(row.english)}</div>
      ${(row.best_score > 0) ? `<span class="best-badge">최고 ${row.best_score}점</span>` : ''}
    </div>
  `).join('');
}

function selectPronSentence(id) {
  s.pron.selected = s.pron.sentences.find(r => r.id === id) || null;
  if (!s.pron.selected) return;
  if (s.pron.isRecording) stopRecording();

  document.getElementById('pron-list-view').style.display = 'none';
  document.getElementById('pron-practice-view').classList.add('visible');
  document.getElementById('pron-target-text').textContent = s.pron.selected.english;
  document.getElementById('pron-result').classList.add('hidden');
  document.getElementById('record-status').textContent = '탭하여 녹음 시작';
  document.getElementById('record-btn').classList.remove('recording');
}

function pronBack() {
  if (s.pron.isRecording) stopRecording();
  document.getElementById('pron-list-view').style.display = '';
  document.getElementById('pron-practice-view').classList.remove('visible');
  renderPronList();
}

function pronListen() {
  if (s.pron.selected) speakEnglish(s.pron.selected.english);
}

function toggleRecording() {
  s.pron.isRecording ? stopRecording() : startRecording();
}

function startRecording() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    showToast('Chrome 또는 Edge 브라우저에서만 지원됩니다');
    return;
  }

  const recog = new SR();
  recog.lang = 'en-US';
  recog.interimResults = false;
  recog.maxAlternatives = 1;
  let hasResult = false;

  recog.onstart = () => {
    s.pron.isRecording = true;
    document.getElementById('record-btn').classList.add('recording');
    document.getElementById('record-status').textContent = '말하세요...';
    document.getElementById('pron-result').classList.add('hidden');
  };

  recog.onresult = (event) => {
    hasResult = true;
    evaluatePronunciation(event.results[0][0].transcript);
  };

  recog.onerror = (event) => {
    const msgs = { 'no-speech': '음성이 감지되지 않았습니다', 'not-allowed': '마이크 권한을 허용해주세요' };
    showToast(msgs[event.error] || '오류: ' + event.error);
  };

  recog.onend = () => {
    s.pron.isRecording = false;
    s.pron.recognition = null;
    document.getElementById('record-btn').classList.remove('recording');
    if (!hasResult) document.getElementById('record-status').textContent = '탭하여 녹음 시작';
  };

  s.pron.recognition = recog;
  recog.start();
}

function stopRecording() {
  if (s.pron.recognition) { s.pron.recognition.stop(); s.pron.recognition = null; }
  s.pron.isRecording = false;
  document.getElementById('record-btn').classList.remove('recording');
}

function evaluatePronunciation(transcript) {
  const target = s.pron.selected?.english || '';
  const norm = str => str.toLowerCase().replace(/[^a-z\s']/g, '').trim();
  const tWords = norm(target).split(/\s+/).filter(Boolean);
  const sWords = norm(transcript).split(/\s+/).filter(Boolean);

  // Word-level LCS for best-effort alignment
  const m = tWords.length, n = sWords.length;
  const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = tWords[i-1] === sWords[j-1] ? dp[i-1][j-1] + 1 : Math.max(dp[i-1][j], dp[i][j-1]);

  const matched = new Set();
  let i = m, j = n;
  while (i > 0 && j > 0) {
    if (tWords[i-1] === sWords[j-1]) { matched.add(i-1); i--; j--; }
    else if (dp[i-1][j] >= dp[i][j-1]) i--;
    else j--;
  }

  const score = m > 0 ? Math.round((matched.size / m) * 100) : 0;

  document.getElementById('pron-score').textContent = score;
  document.getElementById('pron-words').innerHTML = tWords
    .map((w, idx) => `<span class="word-chip ${matched.has(idx) ? 'match' : 'miss'}">${esc(w)}</span>`)
    .join('');

  const prevBest = s.pron.selected?.best_score || 0;
  const bestEl = document.getElementById('pron-best-record');
  if (score > prevBest) {
    bestEl.innerHTML = `<span class="pron-new-record">★ 신기록!</span> (이전: ${prevBest > 0 ? prevBest + '점' : '없음'})`;
    savePronScore(s.pron.selected.id, score);
  } else {
    bestEl.textContent = prevBest > 0 ? `최고 기록: ${prevBest}점` : '';
  }

  document.getElementById('pron-result').classList.remove('hidden');
  document.getElementById('record-status').textContent = '탭하여 다시 녹음';
}

async function savePronScore(id, score) {
  try {
    await fetch(`/api/sentences/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ best_score: score }),
    });
    const row = s.pron.sentences.find(r => r.id === id);
    if (row) row.best_score = score;
    if (s.pron.selected?.id === id) s.pron.selected.best_score = score;
  } catch { /* silent — score already shown */ }
}
</script>
